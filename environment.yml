name: transformer-translation
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - pip:
    # Deep Learning Framework
    - torch==2.11.0
    - torchvision==0.26.0
    - torchaudio==2.11.0
    # NLP & Translation
    - transformers==5.5.1
    - tokenizers==0.22.2
    - datasets==4.8.4
    - sacrebleu==2.6.0
    - nltk==3.9.4
    # Data Processing & Visualization
    - numpy==2.4.4
    - pandas==3.0.2
    - matplotlib==3.10.8
    - seaborn==0.13.2
    - pillow==12.2.0
    # Utilities
    - tqdm==4.67.3
    - requests==2.33.1